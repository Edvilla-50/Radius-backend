name: radius_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.6+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  http: ^1.6.0
  drag_and_drop_lists: ^0.4.2
  webview_flutter: ^4.4.0
  introduction_screen: ^3.1.0
  shared_preferences: ^2.2.2
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"